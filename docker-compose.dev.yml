version: '3.8'

# Development Docker Compose Configuration
# Use this for local development with hot reloading and debugging

services:
  # =================================================================
  # API Backend
  # =================================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: transcription-api-dev
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - RELOAD=true
      - DETECTED_PROFILE=CPU_STRONG
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - postgres
      - redis
      - chroma
    networks:
      - transcription-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =================================================================
  # Background Workers
  # =================================================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: transcription-worker-dev
    command: celery -A app.tasks.celery_app worker --loglevel=debug --concurrency=2
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - CELERY_WORKER_CONCURRENCY=2
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - redis
      - postgres
    networks:
      - transcription-network
    restart: unless-stopped

  # =================================================================
  # Frontend Development Server
  # =================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: transcription-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - transcription-network
    restart: unless-stopped
    command: npm start

  # =================================================================
  # Database Services
  # =================================================================
  postgres:
    image: postgres:15-alpine
    container_name: transcription-postgres-dev
    environment:
      - POSTGRES_DB=transcription_db
      - POSTGRES_USER=transcription
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./monitoring/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - transcription-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcription -d transcription_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: transcription-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    networks:
      - transcription-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # =================================================================
  # AI Services
  # =================================================================
  chroma:
    image: chromadb/chroma:latest
    container_name: transcription-chroma-dev
    ports:
      - "8001:8000"
    volumes:
      - chroma_dev_data:/chroma/chroma
    environment:
      - CHROMA_HOST=0.0.0.0
      - CHROMA_PORT=8000
    networks:
      - transcription-network
    restart: unless-stopped

  # =================================================================
  # Storage Services
  # =================================================================
  minio:
    image: minio/minio:latest
    container_name: transcription-minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:9001
    volumes:
      - minio_dev_data:/data
    command: server /data --console-address ":9001"
    networks:
      - transcription-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # =================================================================
  # Monitoring & Observability (Development)
  # =================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: transcription-prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml
      - prometheus_dev_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - transcription-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: transcription-grafana-dev
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_dev_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - transcription-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: transcription-alertmanager-dev
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - transcription-network
    restart: unless-stopped

  # =================================================================
  # Development Tools
  # =================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: transcription-pgadmin-dev
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@transcription.dev
      - PGADMIN_DEFAULT_PASSWORD=admin
    networks:
      - transcription-network
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: transcription-redisinsight-dev
    ports:
      - "8002:8001"
    networks:
      - transcription-network
    restart: unless-stopped

# =================================================================
# Networks
# =================================================================
networks:
  transcription-network:
    driver: bridge

# =================================================================
# Volumes
# =================================================================
volumes:
  postgres_dev_data:
  redis_dev_data:
  chroma_dev_data:
  minio_dev_data:
  prometheus_dev_data:
  grafana_dev_data: