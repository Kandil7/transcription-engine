groups:
  - name: transcription_engine_alerts
    rules:
      # API Health Alerts
      - alert: APIDown
        expr: up{job="transcription-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API service is down"
          description: "The transcription API service has been down for more than 1 minute."

      - alert: APIHighErrorRate
        expr: rate(http_requests_total{job="transcription-api", status=~"5.."}[5m]) / rate(http_requests_total{job="transcription-api"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate"
          description: "API error rate is {{ $value | printf \"%.2f\" }}% over the last 5 minutes."

      # Worker Health Alerts
      - alert: CeleryWorkerDown
        expr: up{job=~"celery-worker.*"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Celery worker is down"
          description: "Celery worker {{ $labels.instance }} has been down for more than 2 minutes."

      - alert: HighQueueLength
        expr: celery_queue_length > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Celery queue length"
          description: "Celery queue length is {{ $value }}, which may indicate processing backlog."

      # System Resource Alerts
      - alert: HighCPUUsage
        expr: (1 - rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }}."

      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }}."

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 10% on {{ $labels.instance }}:{{ $labels.mountpoint }}."

      # Database Alerts
      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database has been down for more than 1 minute."

      - alert: PostgreSQLHighConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High PostgreSQL connection count"
          description: "PostgreSQL has {{ $value }} active connections."

      # Redis Alerts
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis cache has been down for more than 1 minute."

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Redis memory usage"
          description: "Redis memory usage is {{ $value | printf \"%.1f\" }}%."

      # GPU Monitoring (if available)
      - alert: GPUHighUtilization
        expr: gpu_utilization > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GPU utilization"
          description: "GPU utilization is {{ $value }}% on {{ $labels.gpu }}."

      - alert: GPUHighMemoryUsage
        expr: gpu_memory_used_bytes / gpu_memory_total_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High GPU memory usage"
          description: "GPU memory usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.gpu }}."

      # Job Processing Alerts
      - alert: JobProcessingStuck
        expr: increase(transcription_jobs_completed_total[10m]) == 0 and increase(transcription_jobs_failed_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Job processing may be stuck"
          description: "No jobs have been completed or failed in the last 10 minutes."

      - alert: HighJobFailureRate
        expr: rate(transcription_jobs_failed_total[5m]) / rate(transcription_jobs_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High job failure rate"
          description: "Job failure rate is {{ $value | printf \"%.1f\" }}% over the last 5 minutes."