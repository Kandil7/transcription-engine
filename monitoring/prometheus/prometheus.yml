global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Service
  - job_name: 'transcription-api'
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 5s
    metrics_path: '/metrics'
    params:
      format: ['prometheus']

  # Celery Workers
  - job_name: 'celery-worker-gpu'
    static_configs:
      - targets: ['worker-gpu:8000']
    scrape_interval: 10s
    metrics_path: '/metrics'

  - job_name: 'celery-worker-cpu'
    static_configs:
      - targets: ['worker-cpu:8000']
    scrape_interval: 10s
    metrics_path: '/metrics'

  # Node Exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']
    scrape_interval: 30s

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
    scrape_interval: 30s

  # ChromaDB
  - job_name: 'chromadb'
    static_configs:
      - targets: ['chromadb:8001']
    scrape_interval: 30s
    metrics_path: '/api/v1/heartbeat'

  # MinIO
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
    scrape_interval: 30s
    metrics_path: '/minio/v2/metrics/cluster'
    params:
      format: ['prometheus']
    basic_auth:
      username: '${MINIO_ACCESS_KEY}'
      password: '${MINIO_SECRET_KEY}'