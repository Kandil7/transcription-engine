global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@transcription-engine.com'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'job']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'email-notifications'

  routes:
    - match:
        severity: critical
      receiver: 'critical-notifications'
      continue: true

    - match:
        severity: warning
      receiver: 'warning-notifications'

receivers:
  - name: 'email-notifications'
    email_configs:
      - to: '${ALERT_EMAIL}'
        from: '${SMTP_FROM}'
        smarthost: smtp.gmail.com:587
        auth_username: '${SMTP_USERNAME}'
        auth_password: '${SMTP_PASSWORD}'
        require_tls: true
        headers:
          subject: '[{{ .GroupLabels.alertname }}] {{ .Annotations.summary }}'
        html: |
          <h2>{{ .GroupLabels.alertname }}</h2>
          <p><strong>Status:</strong> {{ .Status }}</p>
          <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Starts At:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>
          <p><strong>Dashboard:</strong> <a href="https://grafana.transcription-engine.com">View Dashboard</a></p>

  - name: 'critical-notifications'
    email_configs:
      - to: '${CRITICAL_ALERT_EMAIL}'
        from: '${SMTP_FROM}'
        smarthost: smtp.gmail.com:587
        auth_username: '${SMTP_USERNAME}'
        auth_password: '${SMTP_PASSWORD}'
        require_tls: true
        headers:
          subject: '🚨 CRITICAL: [{{ .GroupLabels.alertname }}] {{ .Annotations.summary }}'
        html: |
          <h2 style="color: red;">🚨 CRITICAL ALERT</h2>
          <h3>{{ .GroupLabels.alertname }}</h3>
          <p><strong>Status:</strong> {{ .Status }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Starts At:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>
          <p><strong>Immediate Action Required!</strong></p>
          <p><strong>Dashboard:</strong> <a href="https://grafana.transcription-engine.com">View Dashboard</a></p>

  - name: 'warning-notifications'
    email_configs:
      - to: '${WARNING_ALERT_EMAIL}'
        from: '${SMTP_FROM}'
        smarthost: smtp.gmail.com:587
        auth_username: '${SMTP_USERNAME}'
        auth_password: '${SMTP_PASSWORD}'
        require_tls: true
        headers:
          subject: '⚠️ WARNING: [{{ .GroupLabels.alertname }}] {{ .Annotations.summary }}'
        html: |
          <h2 style="color: orange;">⚠️ WARNING ALERT</h2>
          <h3>{{ .GroupLabels.alertname }}</h3>
          <p><strong>Status:</strong> {{ .Status }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Starts At:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>
          <p><strong>Dashboard:</strong> <a href="https://grafana.transcription-engine.com">View Dashboard</a></p>

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'job']