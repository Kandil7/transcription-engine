# =================================================================
# Pre-commit Configuration for SoutiAI Transcription Engine
# =================================================================
# Run pre-commit install to set up hooks
# Run pre-commit run --all-files to test all files

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false

repos:
  # =================================================================
  # Python Code Quality
  # =================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        name: Remove trailing whitespace
        description: Remove trailing whitespace from all files
        entry: trailing-whitespace
        language: system
        types: [text]

      - id: end-of-file-fixer
        name: Fix end of files
        description: Ensure files end with a newline
        entry: end-of-file-fixer
        language: system
        types: [text]

      - id: check-yaml
        name: Check YAML files
        description: Validate YAML file syntax
        entry: check-yaml
        language: system
        types: [yaml]

      - id: check-added-large-files
        name: Check for large files
        description: Prevent large files from being committed
        entry: check-added-large-files
        language: system

      - id: check-merge-conflict
        name: Check merge conflicts
        description: Check for merge conflict markers
        entry: check-merge-conflict
        language: system
        types: [text]

      - id: debug-statements
        name: Check debug statements
        description: Check for debug statements in Python code
        entry: debug-statements
        language: system
        types: [python]

      - id: check-ast
        name: Check Python AST
        description: Check Python syntax by parsing AST
        entry: check-ast
        language: system
        types: [python]

  # =================================================================
  # Python Formatting and Linting
  # =================================================================
  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        name: Format Python code
        description: Format Python code with Black
        entry: black
        language: python
        types: [python]
        args: [--line-length=100]

      - id: black-jupyter
        name: Format Jupyter notebooks
        description: Format Jupyter notebooks with Black
        entry: black
        language: python
        types: [jupyter]
        additional_dependencies: [black[jupyter]]

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: Sort Python imports
        description: Sort Python imports with isort
        entry: isort
        language: python
        types: [python]
        args: [--profile=black, --line-length=100]

  - repo: https://github.com/pycqa/flake8
    rev: 6.0.0
    hooks:
      - id: flake8
        name: Lint Python code
        description: Lint Python code with flake8
        entry: flake8
        language: python
        types: [python]
        args: [--max-line-length=100, --extend-ignore=E203,W503,E501]
        additional_dependencies:
          - flake8-bugbear
          - flake8-comprehensions
          - flake8-simplify

  - repo: https://github.com/pycqa/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: Check security issues
        description: Check Python code for security issues
        entry: bandit
        language: python
        types: [python]
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: tests/

  # =================================================================
  # Type Checking
  # =================================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.5.1
    hooks:
      - id: mypy
        name: Type check Python code
        description: Type check Python code with mypy
        entry: mypy
        language: python
        types: [python]
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies: [types-all]
        exclude: tests/

  # =================================================================
  # Frontend Code Quality
  # =================================================================
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.45.0
    hooks:
      - id: eslint
        name: Lint JavaScript/React code
        description: Lint JavaScript and React code with ESLint
        entry: eslint
        language: node
        types: [javascript, jsx, ts, tsx]
        files: \.(js|jsx|ts|tsx)$
        additional_dependencies:
          - eslint@^8.0.0
          - eslint-plugin-react@^7.0.0
          - eslint-plugin-react-hooks@^4.0.0
          - "@typescript-eslint/eslint-plugin@^5.0.0"
          - "@typescript-eslint/parser@^5.0.0"
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.2
    hooks:
      - id: prettier
        name: Format frontend code
        description: Format JavaScript, CSS, and other frontend files
        entry: prettier
        language: node
        types: [javascript, jsx, ts, tsx, css, scss, html, json, yaml, markdown]
        args: [--write]

  # =================================================================
  # Docker and Infrastructure
  # =================================================================
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfiles
        description: Lint Dockerfiles with hadolint
        entry: hadolint
        language: system
        types: [dockerfile]
        args: [--ignore=DL3008, --ignore=DL3018, --ignore=SC1091]

  # =================================================================
  # Git and Commit Quality
  # =================================================================
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        name: Lint commit messages
        description: Lint commit messages with gitlint
        entry: gitlint
        language: python
        stages: [commit-msg]
        additional_dependencies: [gitlint]

  # =================================================================
  # Documentation
  # =================================================================
  - repo: https://github.com/Lucas-C/pre-commit-hooks-markup
    rev: v1.0.1
    hooks:
      - id: rst-linter
        name: Lint reStructuredText
        description: Lint reStructuredText files
        entry: rst-linter
        language: python
        types: [rst]

  # =================================================================
  # Security Scanning
  # =================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        description: Detect secrets in code
        entry: detect-secrets
        language: python
        args: [--baseline, .secrets.baseline]

  # =================================================================
  # Custom Hooks (Project Specific)
  # =================================================================
  - repo: local
    hooks:
      - id: check-env-files
        name: Check environment files
        description: Ensure .env files are not committed
        entry: bash -c 'if git diff --cached --name-only | grep -q "^\.env"; then echo "Error: .env files should not be committed"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: check-large-files
        name: Check for large model files
        description: Warn about large model files
        entry: bash -c 'find . -name "*.bin" -o -name "*.pt" -o -name "*.h5" | head -5 | while read file; do if [ -f "$file" ] && [ $(stat -f%z "$file" 2>/dev/null || stat -c%s "$file") -gt 1000000000 ]; then echo "Warning: Large model file detected: $file"; fi; done'
        language: system
        pass_filenames: false

# =================================================================
# Configuration Files
# =================================================================
# These files should be created if they don't exist:

# .secrets.baseline (for detect-secrets)
# This should be generated with: detect-secrets scan --baseline .secrets.baseline

# pyproject.toml (for Python project configuration)
# [tool.black]
# line-length = 100
#
# [tool.isort]
# profile = "black"
# line_length = 100
#
# [tool.bandit]
# exclude_dirs = ["tests", "docs"]
# skips = ["B101", "B601"]