apiVersion: apps/v1
kind: Deployment
metadata:
  name: chroma
  namespace: transcription-engine
  labels:
    app: transcription-engine
    component: vector-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transcription-engine
      component: vector-db
  template:
    metadata:
      labels:
        app: transcription-engine
        component: vector-db
    spec:
      containers:
      - name: chroma
        image: chromadb/chroma:latest
        ports:
        - containerPort: 8000
        env:
        - name: CHROMA_HOST
          value: "0.0.0.0"
        - name: CHROMA_PORT
          value: "8000"
        - name: CHROMA_ALLOW_RESET
          value: "false"
        - name: CHROMA_ANONYMIZED_TELEMETRY
          value: "false"
        volumeMounts:
        - name: chroma-data
          mountPath: /chroma/chroma
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/heartbeat
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/v1/heartbeat
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: chroma
  namespace: transcription-engine
  labels:
    app: transcription-engine
    component: vector-db
spec:
  selector:
    app: transcription-engine
    component: vector-db
  ports:
  - port: 8000
    targetPort: 8000

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-pvc
  namespace: transcription-engine
  labels:
    app: transcription-engine
    component: vector-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard