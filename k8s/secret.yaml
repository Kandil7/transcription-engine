apiVersion: v1
kind: Secret
metadata:
  name: transcription-secrets
  namespace: transcription-engine
  labels:
    app: transcription-engine
type: Opaque
stringData:
  # JWT settings
  JWT_SECRET_KEY: "change-this-in-production-to-a-secure-random-key-32-chars-minimum"
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"

  # API keys
  API_KEY_HEADER: "X-API-Key"
  API_KEYS: "prod-api-key-1,prod-api-key-2"

  # Rate limiting
  RATE_LIMIT_REQUESTS: "1000"
  RATE_LIMIT_WINDOW: "60"
  RATE_LIMIT_BURST: "200"

  # Encryption
  ENCRYPTION_KEY: "change-this-to-a-32-byte-encryption-key-for-production"
  ENCRYPTION_ALGORITHM: "AES256"

  # Sentry (Error tracking)
  SENTRY_DSN: "https://your-sentry-dsn@sentry.io/project-id"

  # External API keys
  OPENAI_API_KEY: "your-openai-api-key"
  HUGGINGFACE_API_KEY: "your-huggingface-api-key"