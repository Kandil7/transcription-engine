apiVersion: apps/v1
kind: Deployment
metadata:
  name: transcription-worker
  namespace: transcription-engine
  labels:
    app: transcription-engine
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transcription-engine
      component: worker
  template:
    metadata:
      labels:
        app: transcription-engine
        component: worker
    spec:
      containers:
      - name: worker
        image: ghcr.io/kandil7/transcription-engine:latest
        command:
        - celery
        - -A
        - app.tasks.celery_app
        - worker
        - --loglevel=info
        - --concurrency=2
        - --pool=prefork
        envFrom:
        - configMapRef:
            name: transcription-config
        - secretRef:
            name: transcription-secrets
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: transcription-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: CHROMA_HOST
          value: "chroma"
        - name: CHROMA_PORT
          value: "8000"
        - name: CELERY_BROKER_URL
          value: "redis://redis:6379/2"
        - name: CELERY_RESULT_BACKEND
          value: "redis://redis:6379/3"
        volumeMounts:
        - name: models
          mountPath: /app/models
        - name: logs
          mountPath: /app/logs
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            nvidia.com/gpu: 1
          limits:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: 1
        livenessProbe:
          exec:
            command:
            - celery
            - -A
            - app.tasks.celery_app
            - inspect
            - ping
          initialDelaySeconds: 60
          periodSeconds: 60
          timeoutSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: transcription-worker
  namespace: transcription-engine
  labels:
    app: transcription-engine
    component: worker
spec:
  selector:
    app: transcription-engine
    component: worker
  ports:
  - port: 5555
    targetPort: 5555
  type: ClusterIP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: transcription-worker-pdb
  namespace: transcription-engine
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: transcription-engine
      component: worker