apiVersion: apps/v1
kind: Deployment
metadata:
  name: transcription-api
  namespace: transcription-engine
  labels:
    app: transcription-engine
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: transcription-engine
      component: api
  template:
    metadata:
      labels:
        app: transcription-engine
        component: api
    spec:
      containers:
      - name: api
        image: ghcr.io/kandil7/transcription-engine:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: transcription-config
        - secretRef:
            name: transcription-secrets
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: transcription-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: CHROMA_HOST
          value: "chroma"
        - name: CHROMA_PORT
          value: "8000"
        volumeMounts:
        - name: models
          mountPath: /app/models
        - name: logs
          mountPath: /app/logs
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            nvidia.com/gpu: 1  # Request 1 GPU
          limits:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: 1
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        startupProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30

---
apiVersion: v1
kind: Service
metadata:
  name: transcription-api
  namespace: transcription-engine
  labels:
    app: transcription-engine
    component: api
spec:
  selector:
    app: transcription-engine
    component: api
  ports:
  - name: http
    port: 80
    targetPort: 8000
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: transcription-api-ingress
  namespace: transcription-engine
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: "transcription-engine-api@kubernetescrd"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.yourdomain.com
    secretName: transcription-api-tls
  rules:
  - host: api.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: transcription-api
            port:
              number: 80

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: api
  namespace: transcription-engine
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
    customResponseHeaders:
      X-Frame-Options: "DENY"
      X-Content-Type-Options: "nosniff"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Permissions-Policy: "geolocation=(), microphone=(), camera=()"